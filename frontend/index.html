<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内网音频广播 - 播放器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-i18n-page-title="app.title.player">
  <div class="container">
    <header class="header">
      <h1 data-i18n="header.player">🎵 内网音频广播</h1>
      <nav>
        <a href="index.html" class="nav-link active" data-i18n="nav.player">播放器</a>
        <a href="dj.html" class="nav-link" data-i18n="nav.dj">DJ 控制台</a>
        <div class="lang-switcher">
          <button class="lang-switcher__btn" data-lang="zh">中文</button>
          <button class="lang-switcher__btn" data-lang="en">EN</button>
        </div>
      </nav>
    </header>

    <main class="main">
      <section class="channels-section">
        <h2 data-i18n="channel.list">频道列表</h2>
        <div class="channel-list" id="channelList">
        </div>
      </section>

      <section class="player-section">
        <div class="player-card">
          <div class="channel-info">
            <h2 id="currentChannelName" data-i18n="channel.selectPrompt">选择一个频道开始收听</h2>
            <p id="currentTrack" class="track-name">--</p>
          </div>

          <div class="audio-container">
            <audio id="audioPlayer" preload="none">
              <span data-i18n="player.browserNotSupported">您的浏览器不支持音频播放。</span>
            </audio>
          </div>

          <div class="player-controls">
            <button id="playBtn" class="control-btn" disabled>
              <span class="play-icon">▶</span>
            </button>
            <div class="volume-control">
              <span>🔊</span>
              <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>
          </div>

          <div class="stats">
            <div class="stat-item">
              <span class="stat-label" data-i18n="player.listenersLabel">在线收听</span>
              <span class="stat-value" id="listenerCount">0</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
